<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Who sent you this link?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff0f5;
      font-family: 'Lato', sans-serif;
    }

    #app {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
      text-align: center;
      padding: 2.5rem 2rem;
    }

    .question-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #2c2c2a;
      margin-bottom: 0.5rem;
    }

    .question-sub {
      font-size: 15px;
      color: #888780;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1.5px solid #f4c0d1;
      border-radius: 12px;
      background: #fff;
      color: #2c2c2a;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
      font-family: 'Lato', sans-serif;
    }

    input[type="text"]:focus {
      border-color: #D4537E;
    }

    .btn {
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      background: #D4537E;
      color: #fff;
      font-family: 'Lato', sans-serif;
    }

    .btn:hover { background: #993556; transform: scale(1.03); }
    .btn:active { transform: scale(0.97); }

    .error {
      font-size: 13px;
      color: #D4537E;
      margin-top: 10px;
      min-height: 18px;
    }

    /* Love Page */
    .love-page {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
    }

    .heart {
      font-size: 72px;
      animation: heartbeat 1.2s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.2); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.15); }
      70%      { transform: scale(1); }
    }

    .love-text {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 700;
      color: #D4537E;
      line-height: 1.3;
    }

    .love-sub {
      font-size: 16px;
      color: #888780;
    }

    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-heart {
      position: absolute;
      font-size: 22px;
      animation: floatUp 3s ease-in infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0.5); }
      20%  { opacity: 1; }
      80%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.2); }
    }

    .love-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Question Page -->
  <div class="page" id="question-page">
    <div style="font-size:56px; margin-bottom:1rem;">💌</div>
    <h1 class="question-title">Who sent you this link?</h1>
    <p class="question-sub">Type the name of the person who shared this with you</p>
    <input type="text" id="name-input" placeholder="Enter their name..." autocomplete="off" />
    <br/>
    <button class="btn" onclick="checkName()">Find out ✨</button>
    <p class="error" id="error-msg"></p>
  </div>

  <!-- Love Page -->
  <div class="page love-page" id="love-page">
    <div class="hearts-bg" id="hearts-bg"></div>
    <div class="love-content">
      <div class="heart">❤️</div>
      <div class="love-text">Arman loves you!</div>
      <div class="love-sub">And now you know 💕</div>
    </div>
  </div>

</div>

<script>
  function checkName() {
    const val = document.getElementById('name-input').value.trim().toLowerCase();
    const accepted = ['arman', 'arman dhidhoch'];

    if (accepted.includes(val)) {
      document.getElementById('question-page').style.display = 'none';
      const lp = document.getElementById('love-page');
      lp.style.display = 'flex';
      spawnHearts();
    } else {
      document.getElementById('error-msg').textContent = "Hmm, that doesn't seem right. Try again! 🤔";
    }
  }

  document.getElementById('name-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkName();
  });

  function spawnHearts() {
    const container = document.getElementById('hearts-bg');
    const emojis = ['❤️', '💕', '💗', '💓', '💞'];
    for (let i = 0; i < 25; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'floating-heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 90 + '%';
        h.style.bottom = '-40px';
        h.style.animationDelay = (Math.random() * 2) + 's';
        h.style.animationDuration = (2.5 + Math.random() * 2) + 's';
        container.appendChild(h);
      }, i * 150);
    }
  }
</script>

</body>
</html>
